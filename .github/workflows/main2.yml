name: Bot Casino 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # Berjalan setiap 6 jam pada minit ke-5 (BEZA 5 MINIT)
    - cron: '5 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          # Guna Secret BOT_TOKEN2
          BOT_TOKEN2: ${{ secrets.BOT_TOKEN2 }}
        # Panggil fail casino
        run: python casino_drink.py
