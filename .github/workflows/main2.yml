name: Casino drink 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Restart setiap 6 jam supaya lebih stabil

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          # Pastikan nama secret di GitHub Settings ialah BOT_TOKEN2
          BOT_TOKEN2: ${{ secrets.BOT_TOKEN2 }}
        # PENTING: Nama fail di bawah mesti sama dengan fail .py anda
        run: python casino_drink.py
