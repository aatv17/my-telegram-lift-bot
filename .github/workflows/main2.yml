name: Bot Casino 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run Bot
        env:
          BOT_TOKEN2: ${{ secrets.BOT_TOKEN2 }} # Guna token bot CASINO
        run: python casino_drink.py # Panggil fail kod casino
