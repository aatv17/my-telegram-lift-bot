name: Bot Cuaca 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # Restart setiap 12 jam untuk pastikan bot tak mati
    - cron: '10 */12 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install python-telegram-bot==20.8
      - name: Run Bot
        env:
          BOT_TOKEN_WEATHER: ${{ secrets.BOT_TOKEN_WEATHER }}
        run: python weather_fictional.py
