name: Bot Cuaca Manual 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # Restart setiap 12 jam supaya bot sentiasa 'awake'
    - cron: '0 */12 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install --upgrade pip
          # Pasang library asas sahaja (lebih laju & stabil)
          pip install python-telegram-bot==20.8

      - name: Run Bot
        env:
          # Pastikan Secret BOT_TOKEN_WEATHER ada di GitHub Settings
          BOT_TOKEN_WEATHER: ${{ secrets.BOT_TOKEN_WEATHER }}
        run: python weather_fictional.py
