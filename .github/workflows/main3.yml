name: Bot Cuaca 24/7

on:
  push:
    branches: [ main ]
  schedule:
    # Berjalan setiap 12 jam untuk pastikan bot sentiasa aktif
    - cron: '15 */12 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          # PENTING: Mesti ada [job-queue] supaya ralat AttributeError hilang
          pip install "python-telegram-bot[job-queue]==20.8"

      - name: Run Bot
        env:
          # Pastikan secret ini ada dalam GitHub Settings anda
          BOT_TOKEN_WEATHER: ${{ secrets.BOT_TOKEN_WEATHER }}
        run: python weather_fictional.py
